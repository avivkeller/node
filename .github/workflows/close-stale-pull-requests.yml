name: Close stale pull requests

on:
  schedule:
    - cron: '30 1 * * *' # Run daily at 01:30 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  STALE_PR_MESSAGE: >
    This pull request has been automatically marked as stale because it has not
    had recent activity. It will be closed in 30 days if no further activity
    occurs. Thank you for your contribution — if this is still relevant, please
    leave a comment or push new changes to keep it open.
  CLOSE_PR_MESSAGE: >
    This pull request has been automatically closed due to inactivity. Feel free
    to reopen it if you'd like to continue working on it.

jobs:
  stale:
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Pull requests: stale after 150 days, close after 180
          days-before-pr-stale: 150
          days-before-pr-close: 30
          stale-pr-label: stale
          stale-pr-message: ${{ env.STALE_PR_MESSAGE }}
          close-pr-message: ${{ env.CLOSE_PR_MESSAGE }}
          exempt-pr-labels: pinned,never-stale

          # Disable issue handling
          days-before-issue-stale: -1
          days-before-issue-close: -1

          # General
          operations-per-run: 500
          remove-stale-when-updated: true
